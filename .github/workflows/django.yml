name: Django CI/CD - Azure

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DEBUG: "False"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGINS: "http://localhost"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        python manage.py test

  cypress:
    runs-on: ubuntu-latest
    needs: test
    env:
      SECRET_KEY: "ci-only-not-a-secret"
      DEBUG: "False"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      CSRF_TRUSTED_ORIGINS: "http://127.0.0.1:8000,http://localhost:8000"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up Node 20
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - name: Install npm dependencies
      run: npm ci

    - name: Apply migrations to local sqlite
      run: python manage.py migrate --noinput

    - name: Collect static files
      run: python manage.py collectstatic --noinput

    - name: Seed minimal demo data for E2E
      run: |
        python manage.py shell <<'PYEOF'
        from games.models import Game, Genre
        if not Game.objects.exists():
            action = Genre.objects.create(name='Ação')
            adventure = Genre.objects.create(name='Aventura')
            g1 = Game.objects.create(
                title='Demo Quest',
                description='Jogo seed para os testes E2E rodarem em CI.',
                release_year=2024,
            )
            g1.genres.add(action, adventure)
            g2 = Game.objects.create(
                title='Pixel Racer',
                description='Outro jogo seed para diversificar a home.',
                release_year=2023,
            )
            g2.genres.add(action)
        PYEOF

    - name: Start Django server in background
      run: |
        nohup python manage.py runserver --insecure 127.0.0.1:8000 > django.log 2>&1 &
        for i in $(seq 1 30); do
          if curl -sf http://127.0.0.1:8000/ > /dev/null; then
            echo "Django is up after ${i}s"
            exit 0
          fi
          sleep 1
        done
        echo "Django failed to start. Log:"
        cat django.log
        exit 1

    - name: Run Cypress E2E tests
      run: npm run cypress:run

    - name: Upload Cypress artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: cypress-artifacts
        path: |
          cypress/videos
          cypress/screenshots
          django.log
        if-no-files-found: ignore

  deploy:
    runs-on: ubuntu-latest
    needs: [test, cypress]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Collect Static Files
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        DEBUG: "False"
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        ALLOWED_HOSTS: "game-ranking-app-ehfhd4gnhvgtatfq.brazilsouth-01.azurewebsites.net"
        CSRF_TRUSTED_ORIGINS: "https://game-ranking-app-ehfhd4gnhvgtatfq.brazilsouth-01.azurewebsites.net"
      run: |
        python manage.py collectstatic --noinput
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: game-ranking-app
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: .
